framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        prefix_seed: my_project_dev
        
        # Use filesystem cache (APCu not available)
        # For better performance, install APCu or use Redis in production
        app: cache.adapter.filesystem
        
        # System cache for framework internals
        system: cache.adapter.system
        
        # Additional cache pools for specific use cases
        pools:
            # Cache for custom application data
            app.cache:
                adapter: cache.adapter.filesystem
                default_lifetime: 3600
            
            # Cache for API responses
            api.cache:
                adapter: cache.adapter.filesystem
                default_lifetime: 600
                
        # For production with Redis (recommended), use:
        # app: cache.adapter.redis
        # default_redis_provider: redis://localhost
        # pools:
        #     doctrine.result_cache_pool:
        #         adapter: cache.adapter.redis
        #     doctrine.system_cache_pool:
        #         adapter: cache.adapter.redis
        
        # If you install APCu later, uncomment this:
        # app: cache.adapter.apcu
